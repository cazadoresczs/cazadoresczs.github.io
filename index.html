<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAZADORES · FUNK</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
  height: 100vh;
  background: #0b1a2a url('./img/fondo.jpg') no-repeat center center;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

  body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5, 10, 20, 0.5);
  backdrop-filter: blur(2px);
  z-index: 0;
}

    .container {
      position: relative;
      text-align: center;
      width: 90%;
      max-width: 400px;
      z-index: 1;
    }

    .logo {
      width: 160px;
      margin-bottom: 30px;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin: 12px 0;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: rgba(20,20,20,0.6);
      transition: 0.2s;
      font-size: 1.05em;
    }

    .links a:hover {
  transform: scale(1.02);
  background: rgba(40,40,40,0.7);
    }
    
    .icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .footer {
      margin-top: 25px;
      font-size: 0.8em;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="./img/logo.png" class="logo" alt="CZS Logo">

    <div class="links">
      
      <a href="https://www.instagram.com/cazadores_czs/" target="_blank">
        <img src="img/icons/instagram.png" class="icon">
        Instagram
      </a>
      
      <a href="https://open.spotify.com/artist/32AktaRVnYmu78yOaFqIcp?si=VfuMp2gWRzesBehCvMhphA" target="_blank">
        <img src="img/icons/spotify.png" class="icon">
        Escuchar en Spotify
      </a>

      <a href="https://www.youtube.com/@cazadoresczs" target="_blank">
        <img src="img/icons/youtube.png" class="icon">
        Ver en YouTube
      </a>

      <a href="https://music.youtube.com/channel/UCF5E5XfyHG7l5eleAzi-4ag" target="_blank">
        <img src="img/icons/youtubemusic.png" class="icon">
        Escuchar en YouTube Music
      </a>

      <a href="mailto:cazadoresczs@gmail.com">
  <img src="img/icons/mail.png" class="icon">
  Contacto
      </a>

    </div>

    <div class="footer">
      © 2026 CZS
    </div>

  </div>

</body>
</html>
