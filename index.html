<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CZS</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      background: url('img/fondo.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* Oscurecer fondo */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }

    .container {
      position: relative;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .logo {
      width: 140px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .links a {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 12px 0;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: rgba(20,20,20,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      transition: 0.2s;
      font-size: 1.1em;
    }

    .links a:hover {
      transform: scale(1.03);
      background: rgba(40,40,40,0.8);
    }

    .footer {
      margin-top: 25px;
      font-size: 0.8em;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="img/logo.png" class="logo" alt="CZS Logo">

    <h1>CZS</h1>

    <div class="links">
      <a href="#">Escuchar en Spotify</a>
      <a href="#">Ver en YouTube</a>
      <a href="#">Instagram</a>
      <a href="#">Contacto</a>
    </div>

    <div class="footer">
      © 2026 CZS
    </div>

  </div>

</body>
</html>
