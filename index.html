<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUNK</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      background: url('./img/fondo.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    .container {
      position: relative;
      text-align: center;
      width: 90%;
      max-width: 400px;
      z-index: 1;
    }

    .logo {
      width: 160px;
      margin-bottom: 30px;
    }

    .links a {
      display: block;
      margin: 12px 0;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: rgba(20,20,20,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      /* backdrop-filter: blur(4px); */
      transition: 0.2s;
      font-size: 1.1em;
    }

    .links a:hover {
      transform: scale(1.03);
      background: rgba(40,40,40,0.8);
    }

    .footer {
      margin-top: 25px;
      font-size: 0.8em;
      opacity: 0.7;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="./img/logo.png" class="logo" alt="CZS Logo">

    <div class="links">
      <a href="https://open.spotify.com/artist/32AktaRVnYmu78yOaFqIcp?si=VfuMp2gWRzesBehCvMhphA" target="_blank">
  Escuchar en Spotify
</a>
      <a href="https://www.youtube.com/@cazadoresczs" target="_blank">
  Ver en YouTube
</a>
      <a href="https://www.instagram.com/cazadores_czs/" target="_blank">
  Instagram
</a>
      <a href="#">Contacto</a>
    </div>

    <div class="footer">
      © 2026 CZS
    </div>

  </div>

</body>
</html>
